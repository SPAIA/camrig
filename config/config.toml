# camrig configuration. Deployed to /etc/camrig/config.toml by setup/install.sh.
# All values shown are the built-in defaults (see camrig/config.py); override here.

[capture]
# Camera backend: "rpicam" (Pi Global Shutter, colour IMX296) or "basler"
# (Basler ace 2 mono over GigE — transport settings in [basler] below, wiring
# and network setup in docs/basler-gige.md). width/height/framerate/quality/
# shutter_us/clip_seconds apply to both backends.
camera = "rpicam"

# Capture profile: "mjpeg" (default daily pipeline, intra-only, clean frames),
# "ffv1" (lossless intra, large), or "raw" (unprocessed sensor frames, huge —
# rpicam: Bayer mosaic; basler: gray8).
profile = "mjpeg"

# Full sensor resolution. IMX296: 1456x1088. For the Basler set your model's
# native size (e.g. a2A1920-51gm: 1920x1200) — larger requests are clamped.
width = 1456
height = 1088

# Highest feasible frame rate for the IMX296 at full res is ~60 fps. For the
# Basler, GigE bandwidth caps Mono8 at ~115 MB/s ≈ width*height*fps (e.g.
# 1920x1200 tops out around 50 fps).
framerate = 60

# MJPEG quality (1-100). Higher = less compression, larger files, cleaner targets.
quality = 95

# Manual exposure for a repeatable test rig. Short shutter freezes insect motion
# but needs adequate light. 0 = let the camera auto-expose (capped by framerate).
shutter_us = 2000

# Sensor gain. 0 = auto. Increase if shutter_us is too short for the lighting.
# Unit differs by backend: rpicam = analogue gain multiplier; basler = dB.
gain = 0.0

# ISP denoise mode (rpicam only; the Basler mono path applies no denoise).
# "cdn_off" disables temporal/3D denoise, which otherwise smears or erases
# insect-sized moving targets. Other values: auto, cdn_fast, cdn_hq.
denoise = "cdn_off"

# Scheduled clip length in seconds (5 minutes).
clip_seconds = 180

# Safety ceiling for human-triggered sessions; the supervisor force-stops after this.
max_session_seconds = 600

[basler]
# Basler ace 2 GigE transport/device settings (used when capture.camera = "basler").
# Requires pypylon in the venv: sudo WITH_BASLER=1 ./setup/install.sh, and the GigE
# network setup in docs/basler-gige.md. List reachable cameras with:
#   /opt/camrig/venv/bin/python -m camrig.basler --list

# Device selection: serial number and/or IP. Both empty = first camera found
# (fine when the ace 2 is the only Basler on the link).
serial = ""
ip = ""

# GevSCPSPacketSize (bytes). 1500 works on any link. If eth0 supports jumbo
# frames (ip link set eth0 mtu 9000), 8192 cuts per-packet overhead — worth
# trying before lowering the frame rate.
packet_size = 1500

# GevSCPD: camera-side pause (ticks) between packets. Raise (e.g. 1000+) if
# you see failed grabs / dropped frames; costs peak bandwidth.
inter_packet_delay = 0

# Mono8 is what the mjpeg/ffv1 pipelines require. Higher bit depths (Mono10p,
# Mono12p) only make sense with profile = "raw" (decode offline).
pixel_format = "Mono8"

[postprocess]
# After each capture, generate per-clip sidecars on the Pi (in the idle gap
# between clips): a low-res H.264 preview and per-frame motion metrics. One
# niced ffmpeg decodes the clip once and feeds both.
enabled = true
# Preview width (px); height follows the aspect ratio. 728 = half sensor width.
preview_width = 728
# Preview frame rate. 0 keeps the source rate; 30 halves the encode work.
preview_fps = 30
# x264 CRF quality (lower = better/larger). The preview is for scrubbing only —
# analysis always reads the original intra-only clip.
preview_crf = 28
# Motion-analysis frame width (px, grayscale); height follows the aspect ratio.
# Always runs at the source frame rate so metric index i aligns with .pts line i.
motion_width = 728
# Per-pixel difference (0-255) above which a pixel counts as "active" motion.
motion_threshold = 12
# Unix niceness for postprocess jobs, so an in-progress capture always wins the CPU.
nice = 10

[schedule]
# Active recording window (local time). Outside it the Pi shuts down.
start_hour = 5
stop_hour = 22
# Scheduled clip cadence in minutes (on :00 and :30 within the window).
interval_min = 30

[storage]
# Preferred fast storage. Used if this path is a mountpoint and writable.
nvme_mount = "/mnt/nvme"
# Fallback when the NVMe mount is absent/not writable.
sd_fallback_dir = "/home/spaia/recordings"
# Keep uploaded clips locally for this many days before they may be pruned.
keep_days = 2
# Start pruning oldest *uploaded* clips when free space drops below this (GiB).
min_free_gb = 5
# Delete a clip's local files as soon as its upload is confirmed, ignoring
# keep_days and min_free_gb. Frees space fastest.
# NOTE: with upload.full_res = false the full-res clip itself never uploads —
# the clip counts as uploaded once its sidecars land, so the full-res copy is
# deleted immediately and there is no window to pull it off the device.
delete_after_upload = false

[upload]
enabled = true

# Upload each clip as soon as its postprocess finishes, so device space frees
# up through the day. false = uploads happen only on the nightly shutdown and
# boot catch-up passes.
immediate = true

# Upload the full-resolution video itself. false = ship only the sidecars
# (preview.mp4, motion.json, pts, json) — the full-res clip then exists only on
# the device and is pruned by retention after keep_days, so pull anything you
# want to keep before then.
full_res = false

# rclone remote name configured in /etc/camrig/rclone.conf (see rclone.conf.example).
rclone_remote = "r2"
bucket = "spaia-vision"

[power]
# Hour to wake the next morning (matches schedule.start_hour).
wake_hour = 5

[cloud]
# Outbound WebSocket URL of the Cloudflare Worker device endpoint.
worker_ws_url = "wss://your-worker.example.workers.dev/device"
# Stable identifier for this rig; the Worker keys its Durable Object on it.
device_id = "pi-rig-01"
# File holding the device bearer token (kept out of config; 0600, root-only).
device_token_file = "/etc/camrig/device_token"
